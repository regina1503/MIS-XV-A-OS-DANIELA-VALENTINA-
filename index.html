<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV Años - Daniela Valentina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Playfair Display', serif; background-color: #000; overflow: hidden; }
        .container-snap { height: 100dvh; overflow-y: hidden; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .page { height: 100dvh; width: 100vw; display: flex; align-items: center; justify-content: center; position: relative; scroll-snap-align: start; overflow: hidden; padding: 0; }
        .page-img { width: 100%; height: 100%; object-fit: cover; }
        
        .lila-bg { background: #966da0; }
        .card { background: rgba(255,255,255,0.95); padding: 2rem; border-radius: 1.5rem; width: 85%; max-width: 350px; text-align: center; color: #4a3f5a; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 0.5rem; margin-top: 1rem; text-align: center; }
        
        .hidden-sections { display: none; }
        .btn-lila { background-color: #966da0; color: white; }
        .btn-ubicacion { position: absolute; bottom: 8%; padding: 0.6rem 1.5rem; color: white; border-radius: 2rem; font-family: 'Dancing Script', cursive; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); background-color: #966da0; z-index: 20; }
        .nombre-quince { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #966da0; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="container-snap" id="bodySnap">

    <audio id="audioTrack" loop>
        <source src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/Chayanne%2C%20Danna%20Paola%20-%20Veo%20en%20ti%20la%20luz%20(De%20EnredadosVideo%20Oficial).mp3" type="audio/mpeg">
    </audio>

    <section class="page lila-bg" id="welcomePage">
        <div class="card">
            <div class="nombre-quince">Daniela Valentina</div>
            <h2 class="text-xl font-bold mb-2">Mis XV Años</h2>
            <p class="text-sm italic">Escribe tu nombre para abrir la invitación</p>
            <input type="text" id="nameInput" placeholder="Tu nombre...">
            <button onclick="iniciarSesion()" class="mt-4 w-full btn-lila py-3 rounded-xl font-bold">Entrar</button>
        </div>
    </section>

    <div id="mainContent" class="hidden-sections">
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/rapunzel.jpg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(9).jpg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(10).jpg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/WhatsApp%20Image%202026-05-26%20at%204.40.09%20PM.jpeg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(11).jpg" class="page-img"></section>
        <!-- Nueva imagen añadida después de la página 5 -->
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/WhatsApp%20Image%202026-05-26%20at%204.40.08%20PM%20(1).jpeg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(3).jpg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/WhatsApp%20Image%202026-05-26%20at%204.40.09%20PM%20(3).jpeg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(4).jpg" class="page-img"></section>
        <section class="page">
            <img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(5).jpg" class="page-img">
            <a href="https://maps.google.com" target="_blank" class="btn-ubicacion">Ver Ubicación</a>
        </section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(6).jpg" class="page-img"></section>
        <section class="page"><img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/WhatsApp%20Image%202026-05-26%20at%204.40.09%20PM%20(1).jpeg" class="page-img"></section>
        
        <section class="page">
            <img src="https://raw.githubusercontent.com/regina1503/MIS-XV-A-OS-DANIELA-VALENTINA-/main/cenicienta%20(7).jpg" class="page-img">
            <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                <div class="card" id="rsvpContainer">
                    <h2 class="text-xl font-bold">Confirmar Asistencia</h2>
                    <p id="msg" class="mt-2"></p>
                    <div id="options" class="mt-4 flex flex-col gap-2"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const lista = [
            { nombre: "JUAN OCAMPO", pases: 2 }, { nombre: "GIBRAN ESCOBAR", pases: 2 }, { nombre: "ALMA OCAMPO", pases: 2 },
            { nombre: "DANIEL MACIAS", pases: 2 }, { nombre: "HENRRY OCAMPO", pases: 6 }, { nombre: "BRANDON OCAMPO", pases: 2 },
            { nombre: "MARIO OCAMPO", pases: 7 }, { nombre: "MARIO OCAMPO", pases: 2 }, { nombre: "CLEOTILDE OCAMPO", pases: 2 },
            { nombre: "JANETH OCAMPO", pases: 4 }, { nombre: "JULIA OCAMPO", pases: 1 }, { nombre: "NAYELI OCAMPO", pases: 1 },
            { nombre: "CARMEN OCAMPO", pases: 2 }, { nombre: "RODRIGO PALMA", pases: 7 }, { nombre: "GABRIELA OCAMPO", pases: 2 },
            { nombre: "JULIAN MIRANDA", pases: 2 }, { nombre: "RUBEN LOPEZ", pases: 3 }, { nombre: "GUADALUPE MIRANDA", pases: 4 },
            { nombre: "GUILLERMO MIRANDA", pases: 2 }, { nombre: "JAVIER MIRANDA", pases: 2 }, { nombre: "RICARDO MIRANDA", pases: 2 },
            { nombre: "SANDRA MIRANDA", pases: 3 }, { nombre: "JUAN MIRANDA", pases: 4 }, { nombre: "JORGE SERRANO", pases: 3 },
            { nombre: "ARTURO MIRANDA", pases: 3 }, { nombre: "DIEGO ESCOBAR", pases: 2 }, { nombre: "ALBERTO MIRANDA", pases: 2 },
            { nombre: "ANTONIO ARRIAGA", pases: 3 }, { nombre: "EDSON MIRANDA", pases: 2 }, { nombre: "JESSIE MIRANDA", pases: 2 },
            { nombre: "FELICIANO MIRANDA", pases: 6 }, { nombre: "SALVADOR MIRANDA", pases: 2 }, { nombre: "PAULINA SERRANO", pases: 2 },
            { nombre: "VIVIANA ABARCA", pases: 3 }, { nombre: "FERNANDO ZEPEDA", pases: 4 }, { nombre: "FIDEL ANGUIANO", pases: 5 },
            { nombre: "MARIA VALENZUELA", pases: 3 }, { nombre: "LILIANA CARDOSO", pases: 2 }, { nombre: "FRANCEZCO MARTINEZ", pases: 2 },
            { nombre: "ARTURO SERRANO", pases: 2 }, { nombre: "ANTONIO MALDONADO", pases: 2 }, { nombre: "EDGAR GARCIA", pases: 2 },
            { nombre: "LINO GARCIA", pases: 2 }, { nombre: "SANDRA LUZ GARCIA", pases: 1 }, { nombre: "EDUARDO GARCIA", pases: 3 },
            { nombre: "RAUL SANCHEZ", pases: 3 }, { nombre: "VERONICA GARCIA", pases: 5 }, { nombre: "OSCAR ALVAREZ", pases: 2 },
            { nombre: "MIGUEL ZARATE", pases: 4 }, { nombre: "JULIO AGMIR", pases: 4 }, { nombre: "ADRIANA", pases: 2 },
            { nombre: "MAYRA MORALES", pases: 3 }, { nombre: "DANIELA", pases: 1 }, { nombre: "CAMILA RAFA", pases: 1 },
            { nombre: "VANESSA", pases: 1 }, { nombre: "ADAMARIS", pases: 1 }, { nombre: "PAOLA", pases: 1 },
            { nombre: "ABIGAIL", pases: 1 }, { nombre: "IAN", pases: 1 }, { nombre: "SANTIAGO", pases: 1 },
            { nombre: "REGINA", pases: 1 }, { nombre: "WINNET", pases: 1 }
        ];

        function iniciarSesion() {
            const nombreIngresado = document.getElementById('nameInput').value.trim();
            const inv = lista.find(i => i.nombre.toUpperCase() === nombreIngresado.toUpperCase());
            
            if(inv) {
                document.getElementById('welcomePage').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden-sections');
                document.getElementById('bodySnap').style.overflowY = 'auto';
                
                document.getElementById('audioTrack').play();
                
                document.getElementById('msg').innerText = `Hola ${inv.nombre}, tienes asignados ${inv.pases} pases.`;
                const optDiv = document.getElementById('options');
                optDiv.innerHTML = ''; 
                
                const btn = document.createElement('a');
                btn.className = "btn-lila p-4 rounded-lg block font-bold text-lg";
                btn.innerText = "Confirmar Asistencia";
                
                const nombreCodificado = encodeURIComponent(inv.nombre);
                btn.href = `https://docs.google.com/forms/d/e/1FAIpQLSed3EoKIgSgmdwkQvF5e5vvGznDG_oqXsJXY1tiNfcXOVKrTw/viewform?usp=pp_url&entry.1093125026=${nombreCodificado}&entry.1396264977=${inv.pases}`;
                btn.target = "_blank";
                optDiv.appendChild(btn);
            } else { alert("Nombre no encontrado. Intenta de nuevo."); }
        }
    </script>
</body>
</html>
