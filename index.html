        /* Contenedor de scroll snap ultra-suave */
        .container-snap {
            height: 100dvh;
            overflow-y: hidden;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .container-snap::-webkit-scrollbar {
            display: none;
        }
        
        .page {
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            scroll-snap-align: start;
            overflow: hidden;

        .page-img {
            width: 100%;

            padding: 2.2rem 1.5rem;
            width: 88%;

            text-align: center;

        /* Botón Lila Mágico para ubicaciones, accesos y mesas de regalos */

            box-shadow: 0 4px 15px rgba(126, 82, 139, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);

        .btn-magic:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(126, 82, 139, 0.2);
        }

        /* Entrada de texto */
        .magic-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid rgba(150, 109, 160, 0.2);
            border-radius: 0.75rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            color: #3b2f44;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .magic-input:focus {
            border-color: #966da0;
            box-shadow: 0 0 10px rgba(150, 109, 160, 0.3);
            background: #ffffff;
        }

        /* Círculos Lila del Temporizador Horizontal */
        .timer-circle {
            width: 60px;
            height: 60px;
            border: 2px solid #966da0;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #7e528b;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 12px rgba(150, 109, 160, 0.2), inset 0 0 8px rgba(150, 109, 160, 0.1);
            animation: pulse-glow-lila 3s infinite alternate;
        }

        @keyframes pulse-glow-lila {
            0% { box-shadow: 0 4px 12px rgba(150, 109, 160, 0.2), inset 0 0 5px rgba(150, 109, 160, 0.1); border-color: #966da0; }
            100% { box-shadow: 0 4px 20px rgba(150, 109, 160, 0.4), inset 0 0 10px rgba(150, 109, 160, 0.2); border-color: #dfba6b; }
        }

        /* Lista de Autocompletado */
        .suggest-box {
            max-height: 140px;
            overflow-y: auto;
            border-radius: 0.75rem;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 1px solid rgba(150, 109, 160, 0.2);

        .suggest-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
            color: #4a3f5a;
            border-bottom: 1px solid #f3eff5;

        .suggest-item:hover {
            background-color: #f3eaf5;
            color: #7e528b;

            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            width: 50px;
            height: 50px;
            border-radius: 50%;

            box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px rgba(150, 109, 160, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;

        .music-disk-btn.playing {

        @keyframes spin {

            left: 0;
            width: 100%;
            height: 100%;

            z-index: 10;

            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            animation: bounce 2s infinite;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -12px); }
            60% { transform: translate(-50%, -6px); }

        // Buscador autocompletable para los invitados en la entrada
        nameInput.addEventListener('input', () => {
            const query = nameInput.value.toUpperCase();
            suggestBox.innerHTML = '';
            
            if (!query) {
                suggestBox.classList.add('hidden');
                return;
            }
            
            const matches = lista.filter(invitado => 
                invitado.nombre.toUpperCase().includes(query)
            );
            
            if (matches.length > 0) {
                suggestBox.classList.remove('hidden');
                matches.slice(0, 4).forEach(invitado => {
                    const div = document.createElement('div');
                    div.className = 'suggest-item font-sans-serif text-sm font-medium';
                    div.innerHTML = `<i class="fa-solid fa-star text-xs text-[#966da0] mr-2"></i>${invitado.nombre}`;
                    div.addEventListener('click', () => {
                        nameInput.value = invitado.nombre;
                        suggestBox.classList.add('hidden');
                    });
                    suggestBox.appendChild(div);
                });
            } else {
                suggestBox.classList.add('hidden');
            }
        });

        // Cerrar el autocompletado si se hace clic fuera del buscador
        document.addEventListener('click', (e) => {
            if (e.target !== nameInput && e.target !== suggestBox) {
                suggestBox.classList.add('hidden');
            }
        });

        // Mostrar un toast personalizado integrado en lugar del alert tradicional
        function showNotification(text) {
            const toast = document.getElementById('toastNotification');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = text;
            
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3500);
        }

        // Control de inicio e ingreso tras validación de nombre
        function iniciarSesion() {
            const nombreIngresado = nameInput.value.trim().toUpperCase();
            
            if(!nombreIngresado) {
                showNotification("Por favor ingresa tu nombre de invitado.");
                return;
            }

            const inv = lista.find(i => i.nombre.toUpperCase() === nombreIngresado);
            
            if(inv) {
                const welcome = document.getElementById('welcomePage');
                welcome.style.transition = 'opacity 0.8s ease';
                welcome.style.opacity = '0';
                
                setTimeout(() => {
                    welcome.style.display = 'none';
                    const main = document.getElementById('mainContent');
                    main.classList.remove('hidden-sections', 'hidden');
                    
                    document.getElementById('bodySnap').style.overflowY = 'auto';
                    
                    // Reproducir pista sonora
                    audio.play().then(() => {
                        updateMusicUI(true);
                    }).catch(err => {
                        console.log("Auto-play bloqueado preventivamente por el navegador");
                        updateMusicUI(false);
                    });

                    floatingPlayer.classList.remove('hidden');
                    
                    // Configuración dinámica del pase e invitados autorizados
                    const textPases = inv.pases === 1 ? "pase personal" : `pases en tu honor`;
                    document.getElementById('msg').innerHTML = `¡Hola <strong class="text-[#7e528b] font-bold">${inv.nombre}</strong>!<br>Nos encantaría contar con tu presencia. Hemos reservado <span class="bg-[#966da0] text-white px-2 py-0.5 rounded-full font-bold">${inv.pases}</span> ${textPases}.`;
                    
                    const container = document.getElementById('options');
                    container.innerHTML = '';
                    
                    // Botón de redirección directo a tu Formulario de Google oficial
                    const btnForm = document.createElement('a');
                    btnForm.className = "btn-magic w-full text-center py-[11px] rounded-full font-semibold text-[13px] tracking-wide flex items-center justify-center gap-2 font-sans-serif shadow-xl transition-all active:scale-95";
                    btnForm.innerHTML = `<i class="fa-solid fa-file-signature"></i> Confirmar Asistencia`;
                    btnForm.href = "https://docs.google.com/forms/d/e/1FAIpQLSed3EoKIgSgmdwkQvF5e5vvGznDG_oqXsJXY1tiNfcXOVKrTw/viewform";
                    btnForm.target = "_blank";
                    
                    container.appendChild(btnForm);

                }, 800);
                
            } else { 
                showNotification("No encontramos tu nombre en la lista de invitados. Revisa la ortografía."); 
            }
        }

        // Eventos y actualizaciones del reproductor
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = pct + '%';
            }
        });

        function updateMusicUI(isPlaying) {
            if (isPlaying) {
                if (btnPlayIcon) {
                    btnPlayIcon.classList.remove('fa-play');
                    btnPlayIcon.classList.add('fa-pause');
                }
                floatingPlayer.classList.add('playing');
                musicPing.classList.remove('hidden');
            } else {
                if (btnPlayIcon) {
                    btnPlayIcon.classList.remove('fa-pause');
                    btnPlayIcon.classList.add('fa-play');
                }
                floatingPlayer.classList.remove('playing');
                musicPing.classList.add('hidden');
            }
        }

        function toggleAudio() {
            if (audio.paused) { 
                audio.play(); 
                updateMusicUI(true);
            } else { 
                audio.pause(); 
                updateMusicUI(false);
            }
        }

        // Navegación en el track
        function seek(e) {
            const width = document.getElementById('progressBar').clientWidth;
            audio.currentTime = (e.offsetX / width) * audio.duration;
        }

        // Adelantar o retrasar audio
        function changeTime(sec) { 
            audio.currentTime += sec; 
        }

        // Cuenta regresiva horizontal estilizada en tonos lila
        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            
            const days = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
            const hours = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            const mins = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
            const secs = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));
            
            const timerContainer = document.getElementById('timer');
            if (timerContainer) {
                timerContainer.innerHTML = 
                    `<div class="timer-circle font-sans-serif"><span class="timer-val text-base font-bold">${days}</span><span class="timer-label text-[7.5px] uppercase tracking-wider text-purple-600 font-semibold">días</span></div>` +
                    `<div class="timer-circle font-sans-serif"><span class="timer-val text-base font-bold">${hours}</span><span class="timer-label text-[7.5px] uppercase tracking-wider text-purple-600 font-semibold">hrs</span></div>` +
                    `<div class="timer-circle font-sans-serif"><span class="timer-val text-base font-bold">${mins}</span><span class="timer-label text-[7.5px] uppercase tracking-wider text-purple-600 font-semibold">min</span></div>` +
                    `<div class="timer-circle font-sans-serif"><span class="timer-val text-base font-bold">${secs}</span><span class="timer-label text-[7.5px] uppercase tracking-wider text-purple-600 font-semibold">seg</span></div>`;
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Canvas interactivo para efectos de destellos / polvo de hadas en el fondo al mover el cursor o deslizar el dedo
        const canvas = document.getElementById("sparkleCanvas");
        const ctx = canvas.getContext("2d");
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1.2 - 0.6;
                this.speedY = Math.random() * -1.2 - 0.4;
                this.alpha = 1;
                this.color = color || `hsla(${Math.random() * 40 + 260}, 80%, 75%, `;
                this.decay = Math.random() * 0.012 + 0.005;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
        }

        // Crear estela mágica en eventos táctiles o de ratón
        window.addEventListener("pointermove", (e) => {
            const isPurple = Math.random() > 0.5;
            const hue = isPurple ? `hsla(${Math.random() * 40 + 265}, 80%, 75%, ` : `hsla(${Math.random() * 15 + 40}, 85%, 65%, `;
            for(let i = 0; i < 2; i++) {
                particles.push(new Particle(e.clientX, e.clientY, hue));
            }
        });

        // Partículas sutiles de fondo automáticas
        function addAmbientParticles() {
            if (particles.length < 35) {
                const x = Math.random() * canvas.width;
                const y = canvas.height + 10;
                const isPurple = Math.random() > 0.5;
                const hue = isPurple ? `hsla(${Math.random() * 40 + 265}, 70%, 70%, ` : `hsla(${Math.random() * 15 + 40}, 75%, 60%, `;
                particles.push(new Particle(x, y, hue));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            addAmbientParticles();
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }

        window.onload = function () {
            animateParticles();
        }
